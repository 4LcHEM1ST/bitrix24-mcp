# nginx block for the Bitrix24 MCP server.
# Subdomain: btrx-mcp.texpertiza.ru (change it if you use another one).
# Each MCP server on the VPS = one subdomain + its own local port.
#
# Install:
#   sudo cp deploy/nginx-mcp.conf /etc/nginx/sites-available/bitrix24-mcp
#   sudo ln -s /etc/nginx/sites-available/bitrix24-mcp /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d btrx-mcp.texpertiza.ru   # issues TLS, adds the 443 block
#
# certbot rewrites this block (adds listen 443 ssl + a redirect from 80).

server {
    listen 80;
    server_name btrx-mcp.texpertiza.ru;

    location / {
        proxy_pass http://127.0.0.1:8001;   # this MCP server's port
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Streamable HTTP / SSE: no buffering, keep the connection long-lived.
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        chunked_transfer_encoding on;
    }
}
