# Bloque nginx para el servidor MCP de Bitrix24.
# Subdominio: btrx-mcp.texpertiza.ru (cambialo si usás otro).
# Cada servidor MCP en el VPS = un subdominio + un puerto local propio.
#
# Instalación:
#   sudo cp deploy/nginx-mcp.conf /etc/nginx/sites-available/bitrix24-mcp
#   sudo ln -s /etc/nginx/sites-available/bitrix24-mcp /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d btrx-mcp.texpertiza.ru   # emite TLS y agrega el bloque 443
#
# certbot transforma este bloque (agrega listen 443 ssl + redirect desde 80).

server {
    listen 80;
    server_name btrx-mcp.texpertiza.ru;

    location / {
        proxy_pass http://127.0.0.1:8001;   # puerto de este servidor MCP
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Streamable HTTP / SSE: sin buffering y conexión larga.
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        chunked_transfer_encoding on;
    }
}
